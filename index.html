<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Minecraft how to guide</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    .box {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    h1, h2 {
      margin-top: 0;
      text-align: center;
    }

    .password-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    input[type="password"] {
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #000;
      color: #f5f5f5;
      min-width: 200px;
    }

    button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    .error {
      color: #f97373;
      margin-top: 5px;
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 6px;
      object-fit: cover;
      max-height: 300px;
    }

    /* 🔥 SUPER SKJULT KNAP */
    .secret-btn {
      position: fixed;
      bottom: 2px;
      right: 2px;
      width: 8px;
      height: 8px;
      opacity: 0;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Kode-boks -->
    <div id="loginBox" class="box">
      <h1>Indtast kode <span id="stepText">1/3</span></h1>
      <div class="password-area">
        <input id="passwordInput" type="password" placeholder="Skriv koden her">
        <button onclick="checkPassword()">Gå ind</button>
        <div id="errorMsg" class="error"></div>
      </div>
    </div>

    <!-- Billed-galleri -->
    <div id="galleryBox" class="box" style="display:none;">
      <h2>Mine billeder</h2>
      <div class="gallery">
        <img src="{5446C230-0489-472C-B513-EF53E6C5E192}.png">
        <img src="{EC87D163-A0E2-4D09-B36D-7D1DF698375F}.png">
        <img src="{51CC3ACC-033E-4C8E-B8C4-D3B74745171E}.png">
        <img src="{301C215B-691C-4914-89FD-CCA459AFF844}.png">
        <img src="{E8297579-B829-41FC-A012-6FE5AF74303D}.png">
        <img src="{CDE4B430-077B-4280-95BC-E1C51710919C}.png">
        <img src="{FBAF3C68-6261-4F02-B51C-DAC689B13F19}.png">
        <img src="Alberte.png">
        <img src="alberte bikini.png">
        <img src="chat_edit_image_20260325_213008.png">
        <img src="alberte 2.jpg">
        <img src="jasmin.png">
        <img src="chat_edit_image_20260325_212656.png">
        <img src="chat_edit_image_20260325_211619.png">
        <img src="awdjawdji.jpg">
        <img src="Task-76974929-1-1.png">
        <img src="wdjawjdia.jpg">
        <img src="Task-76973840-2-2.png">
        <img src="IMG_3594.png">
      </div>
    </div>
  </div>

  <!-- 👇 HEMMELIG KNAP (udenfor boksen) -->
  <div class="secret-btn" onclick="skipToLastStep()"></div>

  <script>
    const KODER = [
      "BaddiesALLE_",
      "_gooners_",
      "flotte_piger"
    ];

    let step = 0;

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const errorMsg = document.getElementById("errorMsg");
      const stepText = document.getElementById("stepText");

      if (input === KODER[step]) {
        step++;

        if (step === 3) {
          document.getElementById("loginBox").style.display = "none";
          document.getElementById("galleryBox").style.display = "block";
          return;
        }

        stepText.textContent = `${step + 1}/3`;
        errorMsg.textContent = "";
        document.getElementById("passwordInput").value = "";
      } else {
        errorMsg.textContent = "Forkert kode. Prøv igen.";
      }
    }

    // 🔥 SPRING DIREKTE TIL SIDSTE KODE
    function skipToLastStep() {
      step = 2; // går direkte til 3/3
      document.getElementById("stepText").textContent = "3/3";
      document.getElementById("errorMsg").textContent = "";
      document.getElementById("passwordInput").value = "";
    }

    document.getElementById("passwordInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        checkPassword();
      }
    });
  </script>
</body>
</html>
