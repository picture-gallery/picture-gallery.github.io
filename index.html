<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Login</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url("https://www.minecraft.net/content/dam/games/minecraft/backgrounds/bg-wool-dark.png") repeat;
      font-family: Arial, sans-serif;
      color: white;
      height: 200vh; /* så man kan scrolle */
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .login-box {
      background: rgba(0,0,0,0.65);
      padding: 40px;
      border-radius: 10px;
      width: 350px;
      text-align: center;
      border: 2px solid #3a3a3a;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 2px solid #555;
      background: #000;
      color: white;
      font-size: 16px;
    }

    button {
      width: 95%;
      padding: 12px;
      background: #00a82d;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #009425;
    }

    /* Usynlig mikro-knap */
    .secret-btn {
      position: fixed;
      bottom: 3px;
      right: 3px;
      width: 12px;
      height: 12px;
      opacity: 0;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <div class="center">
    <div class="login-box">
      <h1>Log ind på din Minecraft konto</h1>
      <input type="text" placeholder="Email">
      <input type="password" placeholder="Password">
      <button>Log ind</button>
    </div>
  </div>

  <!-- Usynlig knap -->
  <div class="secret-btn" onclick="goRealPage()"></div>

  <script>
    function goRealPage() {
      window.location.href = "https://picture-gallery.github.io";
    }
  </script>

</body>
</html>
