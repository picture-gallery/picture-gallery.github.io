<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Style Login</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('minecraft-bg.jpg') center/cover no-repeat fixed;
    color: #fff;
  }

  .overlay {
    background: rgba(0,0,0,0.55);
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .container {
    display: flex;
    gap: 40px;
    background: rgba(20,20,20,0.85);
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    max-width: 900px;
    width: 100%;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .left h1 {
    margin: 0 0 10px 0;
    font-size: 28px;
    font-weight: bold;
  }

  .btn {
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
  }

  .ms-btn {
    background: #2d7df4;
    color: white;
  }

  .ms-btn:hover {
    background: #1f5ec0;
  }

  .signup-btn {
    background: #3b3b3b;
    color: white;
  }

  .signup-btn:hover {
    background: #2a2a2a;
  }

  .right {
    flex: 1;
    background: rgba(0,0,0,0.3);
    padding: 20px;
    border-radius: 8px;
  }

  .right h2 {
    margin-top: 0;
    font-size: 22px;
  }

  .checklist {
    margin-top: 15px;
    line-height: 1.7;
  }

  .checklist span {
    color: #7CFC00;
    font-weight: bold;
  }

  .small-link {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.8;
  }

  .small-link a {
    color: #7CFC00;
    text-decoration: none;
  }
</style>
</head>

<body>

<div class="overlay">
  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
      <h1>Welcome</h1>

      <button class="btn ms-btn">SIGN IN WITH Microsoft</button>
      <button class="btn signup-btn">SIGN UP</button>

      <div class="small-link">
        Trying to sign in with your old account?  
        <a href="#">Click here</a>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
      <h2>Manage your Minecraft experience</h2>

      <div class="checklist">
        <span>✓</span> Buy games and Realms<br>
        <span>✓</span> Customize your profile<br>
        <span>✓</span> Manage Java & Bedrock Realms<br>
        <span>✓</span> Invite and play with friends
      </div>
    </div>

  </div>
</div>

</body>
</html>
