<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Minecraft Guide</title>

<!-- Pixel font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Press Start 2P', Arial;
    color: white;
    background: url("https://images.unsplash.com/photo-1603570419989-0e1a7f7f9e2b") no-repeat center center fixed;
    background-size: cover;
  }

  /* mørk overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: -1;
  }

  /* ===== FORSIDE ===== */
  #frontPage {
    min-height: 200vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    text-align: center;
    padding: 60px 20px 20px;
  }

  .header h1 {
    font-size: 30px;
    color: #4ade80;
  }

  .login-box {
    background: rgba(0,0,0,0.8);
    border: 3px solid #22c55e;
    max-width: 420px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    background: black;
    border: 2px solid #22c55e;
    color: white;
    border-radius: 4px;
  }

  button {
    padding: 10px;
    background: #22c55e;
    border: none;
    cursor: pointer;
    color: black;
    font-weight: bold;
    width: 100%;
  }

  button:hover {
    background: #16a34a;
  }

  .footer {
    margin-top: auto;
    padding: 60px;
    text-align: center;
    font-size: 10px;
  }

  /* 👻 skjult knap */
  .secret {
    position: fixed;
    bottom: 3px;
    right: 3px;
    width: 10px;
    height: 10px;
    opacity: 0;
    cursor: pointer;
  }

  /* ===== KODE SIDE ===== */
  #codePage {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
  }

  .container {
    max-width: 900px;
    width: 100%;
    padding: 20px;
  }

  .box {
    background: rgba(0,0,0,0.85);
    border: 3px solid #22c55e;
    padding: 20px;
  }

  .password-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .error {
    color: red;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 20px;
  }

  .gallery img {
    width: 100%;
    border: 2px solid #22c55e;
  }
</style>
</head>

<body>

<!-- ===== FORSIDE ===== -->
<div id="frontPage">
  <div class="header">
    <h1>MINECRAFT GUIDE</h1>
    <p>Log ind for at fortsætte</p>
  </div>

  <div class="login-box">
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Adgangskode">
    <button onclick="fakeLogin()">Log ind</button>
  </div>

  <div class="footer">
    <p>Kontakt | Vilkår | Privatliv</p>
  </div>
</div>

<div class="secret" onclick="goSecret()"></div>

<!-- ===== KODE + GALLERI ===== -->
<div id="codePage">
  <div class="container">

    <div id="loginBox" class="box">
      <h1>Indtast kode <span id="stepText">1/3</span></h1>
      <div class="password-area">
        <input id="passwordInput" type="password">
        <button onclick="checkPassword()">Gå ind</button>
        <div id="errorMsg" class="error"></div>
      </div>
    </div>

    <div id="galleryBox" class="box" style="display:none;">
      <h2>Mine billeder</h2>
      <div class="gallery">

        <!-- ALLE DINE BILLEDER -->
        <img src="{5446C230-0489-472C-B513-EF53E6C5E192}.png">
        <img src="{EC87D163-A0E2-4D09-B36D-7D1DF698375F}.png">
        <img src="{51CC3ACC-033E-4C8E-B8C4-D3B74745171E}.png">
        <img src="{301C215B-691C-4914-89FD-CCA459AFF844}.png">
        <img src="{E8297579-B829-41FC-A012-6FE5AF74303D}.png">
        <img src="{CDE4B430-077B-4280-95BC-E1C51710919C}.png">
        <img src="{FBAF3C68-6261-4F02-B51C-DAC689B13F19}.png">
        <img src="Alberte.png">
        <img src="alberte bikini.png">
        <img src="chat_edit_image_20260325_213008.png">
        <img src="alberte 2.jpg">
        <img src="jasmin.png">
        <img src="chat_edit_image_20260325_212656.png">
        <img src="chat_edit_image_20260325_211619.png">
        <img src="awdjawdji.jpg">
        <img src="Task-76974929-1-1.png">
        <img src="wdjawjdia.jpg">
        <img src="Task-76973840-2-2.png">
        <img src="IMG_3594.png">
        <img src="{F35AE000-EF2F-4DE7-AB8F-898EB2CCCCB9}.png">
        <img src="{CC9150ED-27FF-42AB-8761-EC46EA949F20}.png">

      </div>
    </div>

  </div>
</div>

<script>
function fakeLogin() {
  alert("Login virker ikke 😉");
}

function goSecret() {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5) {
    document.getElementById("frontPage").style.display = "none";
    document.getElementById("codePage").style.display = "flex";
    window.scrollTo(0,0);
  }
}

const KODER = [
  "BaddiesALLE_",
  "_gooners_",
  "flotte_piger"
];

let step = 0;

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  const errorMsg = document.getElementById("errorMsg");
  const stepText = document.getElementById("stepText");

  if (input === KODER[step]) {
    step++;

    if (step === 3) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("galleryBox").style.display = "block";
      return;
    }

    stepText.textContent = `${step + 1}/3`;
    errorMsg.textContent = "";
    document.getElementById("passwordInput").value = "";
  } else {
    errorMsg.textContent = "Forkert kode";
  }
}

document.getElementById("passwordInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    checkPassword();
  }
});
</script>

</body>
</html>
