<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Minecraft how to guide</title>

  <style>
    /* === Minecraft Login Style === */
    body {
      margin: 0;
      padding: 0;
      background: url("https://www.minecraft.net/content/dam/games/minecraft/backgrounds/bg-wool-dark.png") repeat;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 200vh; /* så man kan scrolle */
    }

    .center-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .login-box {
      background: rgba(0,0,0,0.65);
      padding: 40px;
      border-radius: 10px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
      border: 2px solid #3a3a3a;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    input[type="password"] {
      width: 90%;
      padding: 12px;
      border-radius: 5px;
      border: 2px solid #555;
      background: #000;
      color: white;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      width: 95%;
      padding: 12px;
      background: #00a82d;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #009425;
    }

    .error {
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 14px;
    }

    /* === Galleri === */
    #galleryBox {
      display: none;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      border-radius: 6px;
      object-fit: cover;
      max-height: 300px;
    }

    /* === Usynlig mikro-knap nederst === */
    .secret-btn {
      position: fixed;
      bottom: 3px;
      right: 3px;
      width: 12px;
      height: 12px;
      opacity: 0;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <!-- Forside login -->
  <div class="center-wrapper" id="loginBox">
    <div class="login-box">
      <h1>Indtast kode <span id="stepText">1/3</span></h1>

      <input id="passwordInput" type="password" placeholder="Skriv koden her">
      <button onclick="checkPassword()">Gå ind</button>

      <div id="errorMsg" class="error"></div>
    </div>
  </div>

  <!-- Galleri -->
  <div id="galleryBox">
    <h2>Mine billeder</h2>
    <div class="gallery">
      <img src="{5446C230-0489-472C-B513-EF53E6C5E192}.png">
      <img src="{EC87D163-A0E2-4D09-B36D-7D1DF698375F}.png">
      <img src="{51CC3ACC-033E-4C8E-B8C4-D3B74745171E}.png">
      <img src="{301C215B-691C-4914-89FD-CCA459AFF844}.png">
      <img src="{E8297579-B829-41FC-A012-6FE5AF74303D}.png">
      <img src="{CDE4B430-077B-4280-95BC-E1C51710919C}.png">
      <img src="{FBAF3C68-6261-4F02-B51C-DAC689B13F19}.png">
      <img src="Alberte.png">
      <img src="alberte bikini.png">
      <img src="chat_edit_image_20260325_213008.png">
      <img src="alberte 2.jpg">
      <img src="jasmin.png">
      <img src="chat_edit_image_20260325_212656.png">
      <img src="chat_edit_image_20260325_211619.png">
      <img src="awdjawdji.jpg">
      <img src="Task-76974929-1-1.png">
      <img src="wdjawjdia.jpg">
      <img src="Task-76973840-2-2.png">
      <img src="IMG_3594.png">
      <img src="{F35AE000-EF2F-4DE7-AB8F-898EB2CCCCB9}.png">
      <img src="{CC9150ED-27FF-42AB-8761-EC46EA949F20}.png">
    </div>
  </div>

  <!-- Usynlig knap -->
  <div class="secret-btn" onclick="skipToLastStep()"></div>

  <script>
    const KODER = ["BaddiesALLE_", "_gooners_", "flotte_piger"];
    let step = 0;

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const errorMsg = document.getElementById("errorMsg");
      const stepText = document.getElementById("stepText");

      if (input === KODER[step]) {
        step++;

        if (step === 3) {
          document.getElementById("loginBox").style.display = "none";
          document.getElementById("galleryBox").style.display = "block";
          return;
        }

        stepText.textContent = `${step + 1}/3`;
        errorMsg.textContent = "";
        document.getElementById("passwordInput").value = "";
      } else {
        errorMsg.textContent = "Forkert kode. Prøv igen.";
      }
    }

    function skipToLastStep() {
      step = 2;
      document.getElementById("stepText").textContent = "3/3";
      document.getElementById("errorMsg").textContent = "";
      document.getElementById("passwordInput").value = "";
    }

    document.getElementById("passwordInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkPassword();
    });
  </script>

</body>
</html>
