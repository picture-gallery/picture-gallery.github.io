<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Minecraft how to guide</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    .box {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    h1, h2 {
      margin-top: 0;
      text-align: center;
    }

    .password-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    input[type="password"] {
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #000;
      color: #f5f5f5;
      min-width: 200px;
    }

    button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    .error {
      color: #f97373;
      margin-top: 5px;
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 6px;
      object-fit: cover;
      max-height: 300px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Kode-boks -->
    <div id="loginBox" class="box">
      <h1>Indtast kode</h1>
      <div class="password-area">
        <input id="passwordInput" type="password" placeholder="Skriv koden her">
        <button onclick="checkPassword()">Gå ind</button>
        <div id="errorMsg" class="error"></div>
      </div>
    </div>

    <!-- Billed-galleri (skjult indtil koden er rigtig) -->
    <div id="galleryBox" class="box" style="display:none;">
      <h2>Mine billeder</h2>
      <div class="gallery">
        <!-- HER LÆGGER DU DINE BILLEDER IND -->
        <img src="{5446C230-0489-472C-B513-EF53E6C5E192}.png" alt="Billede 1">
        <img src="{EC87D163-A0E2-4D09-B36D-7D1DF698375F}.png" alt="Billede 2">
        <img src="{51CC3ACC-033E-4C8E-B8C4-D3B74745171E}.png" alt="Billede 3">
        
        
        <img src="{B5B695CB-7C3D-4010-972D-3E6FCF0ED9A1}.png" alt="Billede 6">
        <img src="{301C215B-691C-4914-89FD-CCA459AFF844}.png" alt="Billede 7">
        <img src="{E8297579-B829-41FC-A012-6FE5AF74303D}.png" alt="Billede 8">
        <img src="{CDE4B430-077B-4280-95BC-E1C51710919C}.png" alt="Billede 9">
        <img src="{FBAF3C68-6261-4F02-B51C-DAC689B13F19}.png" alt="Billede 10">
        <img src="Alberte.png" alt="Billede 11">
        
        <!-- Du kan bare kopiere linjen ovenover og ændre filnavn -->
      </div>
    </div>
  </div>

  <script>
    // Sæt din kode her:
    const RIGTIG_KODE = "BaddiesALLE_"; // Ændr "1234" til den kode du vil bruge

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const errorMsg = document.getElementById("errorMsg");

      if (input === RIGTIG_KODE) {
        // Skjul login-boksen og vis galleriet
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("galleryBox").style.display = "block";
      } else {
        errorMsg.textContent = "Forkert kode. Prøv igen.";
      }
    }

    // Tryk Enter for at logge ind
    document.getElementById("passwordInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        checkPassword();
      }
    });
  </script>
</body>
</html>
